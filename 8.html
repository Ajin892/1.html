<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gallery</title>
</head>
<body>

    <header>
        <h1>Media Gallery</h1>
        <p>Enjoy our featured video and audio content.</p>
    </header>

    <main>
        <section>
            <h2>Featured Video</h2>
            <iframe
                width="560"
                height="315"
                src="https://www.youtube.com/embed/dQw4w9WgXcQ"
                title="YouTube Video Player"
                allowfullscreen>
            </iframe>
        </section>

        <section>
            <h2>Featured Audio</h2>
            <audio controls>
                <source src="audio/sample.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Media Gallery. All rights reserved.</p>
    </footer>

</body>
</html>
