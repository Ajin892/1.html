<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Signup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .newsletter {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            width: 350px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .newsletter h2 {
            margin-top: 0;
        }

        .newsletter label {
            display: block;
            margin: 12px 0 5px;
        }

        .newsletter input[type="text"],
        .newsletter input[type="email"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        .checkbox-group {
            margin: 15px 0;
        }

        .checkbox-group label {
            display: inline;
            margin-left: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #0078d4;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #005ea6;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <section class="newsletter">
        <h2>Newsletter Signup</h2>

        <form>
            <label for="fullname">Full Name</label>
            <input
                type="text"
                id="fullname"
                name="fullname"
                required
            >

            <label for="email">Email Address</label>
            <input
                type="email"
                id="email"
                name="email"
                required
            >

            <div class="checkbox-group">
                <input
                    type="checkbox"
                    id="terms"
                    name="terms"
                    required
                >
                <label for="terms">
                    I agree to the Terms and Conditions
                </label>
            </div>

            <button type="submit">Subscribe</button>
        </form>

        <footer>
            &copy; 2026
        </footer>
    </section>

</body>
</html>
