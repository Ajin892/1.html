<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Harry Potter Predictor</title>
  <style>
    body {
      background: url('your-background-image.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: Arial, sans-serif;
      color: #fff;
      text-align: center;
    }
    .characters {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 40px;
      margin: 10px 0;
      font-size: 1.2em;
      font-weight: bold;
      object-fit: cover;
    }
    .character-card {
      border: 3px solid transparent;
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
      transition: border 0.3s;
      background: rgba(225, 5, 5, 0.4);
      width: 180px;
    }
    .character-card.selected {
      border: 3px solid #00ff84;
      box-shadow: 0 0 20px #ffd700;
    }
    .character-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }
    .character-name {
      margin: 10px 0;
      font-size: 1.2em;
      font-weight: bold;
      object-fit: cover;
    }
    .video-section {
      margin-top: 40px;
      display: none;
    }
    .video-section.active {
      display: block;
    }
  </style>
</head>
<body>
  <h1>Harry Potter Character Predictor</h1>
  <p>Select a character to reveal your magical destiny!</p>
  <div class="characters">
    <div class="character-card" onclick="selectCharacter('Ginny Weasley')">
      <img src="1e57a0bd-7f8a-4a93-8f3e-7d202e741a41.jpg" alt="Ginny Weasley">
      <div class="character-name">Ginny Weasley</div>
    </div>
    <div class="character-card" onclick="selectCharacter('Hermione Granger')">
      <img src="ab09cf27-f00c-4a7b-acde-5320442392c9.jpg" alt="Hermione Granger">
      <div class="character-name">Hermione Granger</div>
    </div>
    <!-- Add more character cards as needed -->
  </div>
  <div id="videoSection" class="video-section">
    <h2 id="selectedCharacter"></h2>
    <video width="480" controls>
      <source src="your-harry-potter-clip.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
  <script>
    function selectCharacter(name) {
      document.querySelectorAll('.character-card').forEach(card => card.classList.remove('selected'));
      event.currentTarget.classList.add('selected');
      document.getElementById('selectedCharacter').textContent = `You selected: ${name}`;
      document.getElementById('videoSection').classList.add('active');
    }
    <div>
      money heist
      stranger things
      alice in boderland
      squd game
      
      </div>
  </script>
</body>
</html>
